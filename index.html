<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Dev <span>Schedule</span></h1>
    <p>Game Dev · Freelancer · Student</p>
  </div>
  <div class="header-right">
    <div class="live-clock" id="liveClock">00:00:00</div>
    <div class="live-date" id="liveDate">—</div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('daily',this)">Daily Routine</button>
  <button class="tab-btn" onclick="switchTab('weekly',this)">Weekly Focus</button>
  <button class="tab-btn" onclick="switchTab('projects',this)">Projects</button>
</div>

<div class="content">
  <!-- Daily Tab -->
  <div class="tab-panel active" id="tab-daily">
    <div class="now-banner">
      <div>
        <div class="now-label">Right now</div>
        <div class="now-name" id="nowName">Loading…</div>
      </div>
      <div class="now-right">
        <div class="now-time" id="nowTime">—</div>
        <div class="now-day" id="nowDay">—</div>
      </div>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- Weekly Tab -->
  <div class="tab-panel" id="tab-weekly">
    <p class="section-hint">Tap any day to see the full session breakdown</p>
    <div class="week-grid" id="weekGrid"></div>
    <div class="day-detail" id="dayDetail" style="display:none"></div>
  </div>

  <!-- Projects Tab -->
  <div class="tab-panel" id="tab-projects">
    <div class="projects-list" id="projectsList"></div>
  </div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="scripts.js"></script>
</body>
</html>
